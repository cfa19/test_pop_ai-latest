services:
  - type: web
    name: pop-skills-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

      # LLM API Keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false

      # Model Configuration
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: EMBED_MODEL
        value: voyage-4-large
      - key: EMBED_DIMENSIONS
        value: "1024"

      # ONNX Token Classifier (downloaded from HuggingFace Hub at startup)
      - key: ONNX_MODELS_PATH
        value: training/models_onnx
      - key: HF_REPO_ID
        value: cfa0819/pop-skills-onnx

      # Semantic Gate
      - key: SEMANTIC_GATE_ENABLED
        value: "true"
      - key: SEMANTIC_GATE_MODEL
        value: all-MiniLM-L6-v2

      # Language
      - key: DEFAULT_LANGUAGE
        value: fr

      # Frontend
      - key: NEXT_PUBLIC_BASE_URL
        value: https://dev.pop-skills.fr
